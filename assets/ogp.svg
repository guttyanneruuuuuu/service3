<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05020e"/>
      <stop offset="50%" stop-color="#12063a"/>
      <stop offset="100%" stop-color="#2a0a5a"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#ff3cac"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="315" r="260" fill="url(#glow)"/>
  <!-- decorative grid -->
  <g stroke="#b388ff" stroke-opacity="0.15" stroke-width="1">
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="480"/>
    <line x1="0" y1="460" x2="1200" y2="580"/>
  </g>
  <!-- Icon -->
  <g transform="translate(860, 170)">
    <path d="M170 10 L330 150 L280 350 L60 350 L10 150 Z" fill="url(#title)" stroke="#fff" stroke-width="3"/>
    <circle cx="170" cy="195" r="55" fill="#05020e" stroke="#fff" stroke-width="3"/>
    <circle cx="170" cy="195" r="22" fill="#ffd54a"/>
  </g>
  <!-- Title -->
  <text x="80" y="260" font-family="Orbitron, sans-serif" font-size="110" font-weight="900" fill="url(#title)" letter-spacing="4">AVATAR</text>
  <text x="80" y="380" font-family="Orbitron, sans-serif" font-size="110" font-weight="900" fill="#ffffff" letter-spacing="4">FORGE</text>
  <!-- Subtitle -->
  <text x="80" y="450" font-family="Noto Sans JP, sans-serif" font-size="30" font-weight="700" fill="#a99dd6">写真1枚で伝説級3Dアバターを召喚</text>
  <text x="80" y="490" font-family="Noto Sans JP, sans-serif" font-size="24" font-weight="400" fill="#6f6698">SSR · SR · R  /  6 STYLES  /  360° RECORD</text>
  <!-- Badge -->
  <g transform="translate(80, 540)">
    <rect width="150" height="40" rx="20" fill="rgba(179,136,255,0.2)" stroke="#b388ff"/>
    <text x="75" y="26" text-anchor="middle" font-family="Orbitron, sans-serif" font-size="16" font-weight="900" fill="#b388ff">FREE · NO SIGNUP</text>
  </g>
</svg>
